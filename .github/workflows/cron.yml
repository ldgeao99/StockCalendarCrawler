name: 🤖 38커뮤니케이션 IPO 일정 자동 수집 파이프라인

on:
  schedule:
    - cron: '30 23 * * *'
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: 🛰️ 레포지토리 소스코드 체크아웃
      uses: actions/checkout@v4

    # 💡 파이썬 3.11로 확실하게 올려 Google API 경고 차단
    - name: 🐍 파이썬 3.11 환경 셋업
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 필수 파이썬 라이브러리 종속성 설치
      run: |
        python -m pip install --upgrade pip
        pip install beautifulsoup4 requests google-cloud-firestore urllib3

    # 💡 [핵심 교정] Base64로 들어온 보안 문자열을 완벽한 무결성 복원 기법으로 디코딩하여 파일 생성
    - name: 🔑 파이어베이스 서비스 계정 보안 키 디코딩 주입
      run: |
        echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}" | base64 --decode > stockcalender-13042-firebase-adminsdk-fbsvc-18b1748d9a.json

    - name: 🚀 주식 크롤러 배치 스크립트 실행
      run: |
        python main.py