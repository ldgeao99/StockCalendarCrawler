name: 🤖 38커뮤니케이션 IPO 일정 자동 수집 파이프라인

on:
  schedule:
    # 💡 UTC 시각 기준 (한국 시각 08:30 = UTC 23:30)
    # 매일 아침 장 시작 전 08시 30분에 로봇이 깨어나서 자동으로 크롤링을 수행합니다.
    - cron: '30 23 * * *'
  workflow_dispatch: # GitHub 웹 페이지에서 [Run workflow] 버튼으로 수동 실행도 가능하게 개방

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    # 1. GitHub 인프라 가상 컴퓨터로 내 크롤러 소스코드 복사
    - name: 🛰️ 레포지토리 소스코드 체크아웃
      uses: actions/checkout@v4

    # 2. 크롤러 동작을 위한 파이썬 환경 격리 구축 (최신 표준 3.10 적용)
    - name: 🐍 파이썬 3.10 환경 셋업
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 환경 가벼움을 유지하기 위해 캐시 처리 후 필수 라이브러리 고속 설치
    - name: 📦 필수 파이썬 라이브러리 종속성 설치
      run: |
        python -m pip install --upgrade pip
        pip install beautifulsoup4 requests google-cloud-firestore

    # 4. 🔥 [핵심 보안] GitHub Secrets에 숨겨둔 파이어베이스 JSON 마스터키를 로봇 컴퓨터에 가상 파일로 동적 생성
    - name: 🔑 파이어베이스 서비스 계정 보안 키 주입
      run: |
        echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}" > stockcalender-13042-firebase-adminsdk-fbsvc-18b1748d9a.json

    # 5. 크롤러 메인 엔진 런타임 가동 및 로그 적재 시동
    - name: 🚀 주식 크롤러 배치 스크립트 실행
      run: |
        python main.py  # 💡 만약 파일명이 crawler.py라면 crawler.py로 변경해 주세요