name: FOMC Fed Decision Crawler (Monthly)

on:
  schedule:
    # 💡 UTC 기준 매월 30일 또는 31일 21:00 UTC -> 한국 시간(KST) 매월 1일 06:00
    # 표현식: 분 시 일 월 요일
    - cron: '0 21 28-31 * *'
  workflow_dispatch: # 필요할 때 깃허브 웹에서 수동으로도 바로 실행할 수 있도록 버튼을 추가합니다.

jobs:
  run-crawler:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-level: '3.10'
        cache: 'pip' # 패키지 캐싱으로 실행 속도를 최적화합니다.

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 google-cloud-firestore urllib3

    - name: Run FED Decision Crawler
      env:
        # 파이어베이스 인증 키가 파일 형태로 존재하지 않고 GitHub Secrets에 기재되어 있을 경우에 대비한 환경 변수 바인딩입니다.
        GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON_PATH || 'stockcalender-13042-firebase-adminsdk-fbsvc-18b1748d9a.json' }}
      run: |
        python crawl_investing_fed_decision.py