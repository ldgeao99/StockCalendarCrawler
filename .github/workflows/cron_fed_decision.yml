name: FOMC Fed Decision Crawler (Monthly)

on:
  schedule:
    # 한국 시간(KST) 매월 1일 오전 06시 00분 실행 설정 (UTC 21:00)
    - cron: '0 21 1 * *'
  workflow_dispatch:

jobs:
  run-crawler:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 google-cloud-firestore urllib3

    # 🔑 [필수 추가] 파이어베이스 인증용 JSON 키 복원 단계를 주입합니다.
    - name: Decode Firebase Key
      run: |
        echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}" | base64 --decode > stockcalender-13042-firebase-adminsdk-fbsvc-18b1748d9a.json

    - name: Run FED Decision Crawler
      run: |
        python crawl_investing_fed_decision.py