name: crawl_ipo_schedule(Daily)

on:
  schedule:
    # 한국 시간(KST) 매일 오전 06시 00분 실행 설정 (UTC 21:00)
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: 🛰️ 레포지토리 소스코드 체크아웃
      uses: actions/checkout@v4

    - name: 🐍 파이썬 3.11 환경 셋업
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 📦 필수 파이썬 라이브러리 종속성 설치
      run: |
        python -m pip install --upgrade pip
        # 💡 불필요해진 cloudscraper 패키지를 제거하여 빌드 시간을 단축합니다.
        pip install beautifulsoup4 requests google-cloud-firestore urllib3 openai

    - name: 🔑 파이어베이스 서비스 계정 보안 키 디코딩 주입
      run: |
        echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}" | base64 --decode > stockcalender-13042-firebase-adminsdk-fbsvc-18b1748d9a.json

    - name: 🚀 주식 크롤러 배치 스크립트 실행 (38커뮤니케이션 IPO 일정)
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        python crawl_ipo_schedule.py