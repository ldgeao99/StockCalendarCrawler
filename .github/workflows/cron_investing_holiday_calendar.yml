name: Global Market Holiday Calendar Crawler (Weekly)

on:
  schedule:
    # 💡 한국 시간(KST) 매주 일요일 오전 06시 00분 실행 설정 (UTC 토요일 21:00)
    - cron: '0 21 * * 0'
  workflow_dispatch: # 필요 시 깃허브 웹에서 즉시 수동 실행 허용

jobs:
  run-crawler:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 google-cloud-firestore urllib3

    # 🔑 파이어베이스 서비스 계정 보안 키 디코딩 주입
    - name: Decode Firebase Key
      run: |
        echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}" | base64 --decode > stockcalender-13042-firebase-adminsdk-fbsvc-18b1748d9a.json

    - name: Run Global Holiday Crawler
      run: |
        # 기존에 등록된 파일명인 crawl_investing_holiday_calendar.py를 호출합니다.
        python crawl_investing_holiday_calendar.py